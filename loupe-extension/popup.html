<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', -apple-system, sans-serif;
    width: 320px;
    background: #fff;
    color: #111;
    letter-spacing: -0.02em;
  }

  /* ── Header ── */
  .header {
    padding: 14px 16px 13px;
    border-bottom: 1px solid #f0f0f0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo { height: 20px; width: auto; display: block; }
  .badge {
    font-size: 10px;
    font-weight: 500;
    color: #71717a;
    background: #f5f5f7;
    padding: 3px 9px;
    border-radius: 100px;
    letter-spacing: 0;
  }

  /* ── Sections ── */
  .section { padding: 13px 16px; border-bottom: 1px solid #f0f0f0; }
  .section-label {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: #a1a1aa;
    margin-bottom: 8px;
  }

  /* ── Input ── */
  input[type="text"] {
    width: 100%;
    border: 1.5px solid #e8e8ec;
    border-radius: 10px;
    padding: 8px 12px;
    font-size: 12px;
    font-family: inherit;
    outline: none;
    color: #111;
    letter-spacing: 0;
    transition: border-color 0.15s;
    background: #fafafa;
  }
  input[type="text"]:focus { border-color: #111; background: #fff; }
  input[type="text"]::placeholder { color: #c8c8d0; }

  /* ── Check chips ── */
  .checks { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip { position: relative; }
  .chip input[type="checkbox"] { position: absolute; opacity: 0; width: 0; height: 0; }
  .chip label {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 5px 11px;
    border-radius: 100px;
    border: 1.5px solid #e8e8ec;
    font-size: 11px;
    font-weight: 500;
    color: #71717a;
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
    letter-spacing: 0;
  }
  .chip input:checked + label {
    border-color: #0f0f0f;
    color: #0f0f0f;
    background: #f5f5f7;
  }
  .chip-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: #d0d0d8;
    flex-shrink: 0;
    transition: background 0.15s;
  }
  .chip input:checked + label .chip-dot { background: #0f0f0f; }

  /* ── Footer / CTA ── */
  .footer { padding: 13px 16px 15px; }

  button#btn {
    width: 100%;
    background: linear-gradient(120deg, #a855f7 0%, #ec4899 50%, #f97316 100%);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 11px 16px;
    font-size: 13px;
    font-weight: 600;
    font-family: inherit;
    letter-spacing: -0.02em;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    transition: opacity 0.15s;
  }
  button#btn:hover:not(:disabled) { opacity: 0.88; }
  button#btn:disabled { opacity: 0.45; cursor: not-allowed; }

  /* spinner inside button */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    width: 12px;
    height: 12px;
    border: 2px solid rgba(255,255,255,0.35);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.65s linear infinite;
    flex-shrink: 0;
  }

  /* ── Status ── */
  .status {
    margin-top: 9px;
    font-size: 11px;
    color: #a1a1aa;
    text-align: center;
    min-height: 15px;
    letter-spacing: 0;
  }
  .status.error { color: #dc2626; }
  .status.ok    { color: #16a34a; }
</style>
</head>

  <span class="badge">Design QA</span>
</div>

<!-- Figma URL -->
<div class="section">
  <div class="section-label">Figma Frame URL</div>
  <input id="figmaUrl" type="text" placeholder="https://figma.com/design/…" />
</div>

<!-- Check options -->
<div class="section">
  <div class="section-label">Checks</div>
  <div class="checks">
    <div class="chip">
      <input type="checkbox" id="chk-missing" checked>
      <label for="chk-missing"><span class="chip-dot"></span>Missing</label>
    </div>
    <div class="chip">
      <input type="checkbox" id="chk-family" checked>
      <label for="chk-family"><span class="chip-dot"></span>Font</label>
    </div>
    <div class="chip">
      <input type="checkbox" id="chk-size" checked>
      <label for="chk-size"><span class="chip-dot"></span>Size</label>
    </div>
    <div class="chip">
      <input type="checkbox" id="chk-weight" checked>
      <label for="chk-weight"><span class="chip-dot"></span>Weight</label>
    </div>
    <div class="chip">
      <input type="checkbox" id="chk-color" checked>
      <label for="chk-color"><span class="chip-dot"></span>Color</label>
    </div>
    <div class="chip">
      <input type="checkbox" id="chk-content" checked>
      <label for="chk-content"><span class="chip-dot"></span>Content</label>
    </div>
    <div class="chip">
      <input type="checkbox" id="chk-spacing" checked>
      <label for="chk-spacing"><span class="chip-dot"></span>Spacing</label>
    </div>
  </div>
</div>

<!-- CTA -->
<div class="footer">
  <button id="btn">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    Run comparison
  </button>
  <div class="status" id="status"></div>
</div>

<script src="popup.js"></script>
</body>
</html>
