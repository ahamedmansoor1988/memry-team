<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', -apple-system, sans-serif;
    width: 352px;
    background: #f7f7f8;
    color: #111113;
    letter-spacing: 0;
  }

  .shell {
    margin: 8px;
    overflow: hidden;
    border: 1px solid #e8e8ec;
    border-radius: 18px;
    background: #fff;
    box-shadow: 0 10px 28px rgba(15, 15, 15, 0.10);
  }

  /* ── Header ── */
  .header {
    padding: 16px 16px 14px;
    border-bottom: 1px solid #f1f1f4;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 14px;
  }
  .brand { min-width: 0; }
  .logo { height: 22px; width: auto; display: block; }
  .subtitle {
    margin-top: 8px;
    max-width: 230px;
    font-size: 12px;
    line-height: 1.35;
    color: #71717a;
  }
  .badge {
    font-size: 10px;
    font-weight: 600;
    color: #71717a;
    background: #f5f5f7;
    border: 1px solid #ededf0;
    padding: 4px 9px;
    border-radius: 100px;
    white-space: nowrap;
  }

  /* ── Sections ── */
  .section { padding: 15px 16px; border-bottom: 1px solid #f1f1f4; }
  .section-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 9px;
  }
  .section-label {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: #a1a1aa;
  }
  .hint {
    font-size: 10px;
    color: #a1a1aa;
  }

  /* ── Input ── */
  input[type="text"] {
    width: 100%;
    border: 1px solid #e4e4e7;
    border-radius: 12px;
    padding: 10px 12px;
    font-size: 12px;
    font-family: inherit;
    outline: none;
    color: #111;
    letter-spacing: 0;
    transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
    background: #fafafa;
  }
  input[type="text"]:focus {
    border-color: #111;
    background: #fff;
    box-shadow: 0 0 0 3px rgba(15, 15, 15, 0.06);
  }
  input[type="text"]::placeholder { color: #c8c8d0; }

  /* ── Check chips ── */
  .checks { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip { position: relative; }
  .chip input[type="checkbox"] { position: absolute; opacity: 0; width: 0; height: 0; }
  .chip label {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 6px 10px;
    border-radius: 10px;
    border: 1px solid #e8e8ec;
    font-size: 11px;
    font-weight: 500;
    color: #71717a;
    background: #fff;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s, background 0.15s;
    user-select: none;
    letter-spacing: 0;
  }
  .chip input:checked + label {
    border-color: #0f0f0f;
    color: #fff;
    background: #0f0f0f;
  }
  .chip-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: #d0d0d8;
    flex-shrink: 0;
    transition: background 0.15s;
  }
  .chip input:checked + label .chip-dot { background: #fff; }

  /* ── Footer / CTA ── */
  .footer { padding: 14px 16px 15px; }

  button#btn {
    width: 100%;
    background: #0f0f0f;
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 12px 16px;
    font-size: 13px;
    font-weight: 600;
    font-family: inherit;
    letter-spacing: 0;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    transition: transform 0.15s, background 0.15s, opacity 0.15s;
  }
  button#btn:hover:not(:disabled) { background: #1f1f23; transform: translateY(-1px); }
  button#btn:disabled { opacity: 0.45; cursor: not-allowed; }

  /* spinner inside button */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    width: 12px;
    height: 12px;
    border: 2px solid rgba(255,255,255,0.35);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.65s linear infinite;
    flex-shrink: 0;
  }

  /* ── Status ── */
  .status {
    margin-top: 10px;
    font-size: 11px;
    color: #a1a1aa;
    text-align: center;
    min-height: 15px;
    letter-spacing: 0;
  }
  .status.error { color: #dc2626; }
  .status.ok    { color: #16a34a; }
</style>
</head>
<body>

<div class="shell">
  <!-- Header -->
  <div class="header">
    <div class="brand">
      <img class="logo" src="loupe.svg" alt="Loupe">
      <p class="subtitle">Capture this live page and compare it with a Figma frame.</p>
    </div>
    <span class="badge">Design QA</span>
  </div>

  <!-- Figma URL -->
  <div class="section">
    <div class="section-head">
      <div class="section-label">Figma Frame URL</div>
      <div class="hint">Copy link to selection</div>
    </div>
    <input id="figmaUrl" type="text" placeholder="https://figma.com/design/…" />
  </div>

  <!-- Check options -->
  <div class="section">
    <div class="section-head">
      <div class="section-label">Checks</div>
      <div class="hint">Stable checks only</div>
    </div>
    <div class="checks">
      <div class="chip">
        <input type="checkbox" id="chk-missing" checked>
        <label for="chk-missing"><span class="chip-dot"></span>Missing Comps</label>
      </div>
      <div class="chip">
        <input type="checkbox" id="chk-family" checked>
        <label for="chk-family"><span class="chip-dot"></span>Font</label>
      </div>
      <div class="chip">
        <input type="checkbox" id="chk-size" checked>
        <label for="chk-size"><span class="chip-dot"></span>Size</label>
      </div>
      <div class="chip">
        <input type="checkbox" id="chk-weight" checked>
        <label for="chk-weight"><span class="chip-dot"></span>Weight</label>
      </div>
      <div class="chip">
        <input type="checkbox" id="chk-color" checked>
        <label for="chk-color"><span class="chip-dot"></span>Color</label>
      </div>
    </div>
  </div>

  <!-- CTA -->
  <div class="footer">
    <button id="btn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      Capture & compare
    </button>
    <div class="status" id="status"></div>
  </div>
</div>

<script src="popup.js"></script>
</body>
</html>
